<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arb Scanner — Bulk</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090f;
            --s1: #111118;
            --s2: #17171f;
            --s3: #1e1e28;
            --border: rgba(255, 255, 255, 0.07);
            --border2: rgba(255, 255, 255, 0.13);
            --text: #ededf5;
            --muted: #7878a0;
            --hint: #4a4a68;
            --purple: #7c6fff;
            --purple2: #a89aff;
            --green: #2dca8a;
            --green-bg: rgba(45, 202, 138, 0.07);
            --green-bd: rgba(45, 202, 138, 0.22);
            --red: #ff5566;
            --red-bg: rgba(255, 85, 102, 0.07);
            --red-bd: rgba(255, 85, 102, 0.22);
            --b365: #00c27a;
            --bf: #f5a623;
            --r: 12px;
            --r-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(124, 111, 255, 0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(124, 111, 255, 0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem;
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 2rem;
        }

        .nav {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .nav a {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            padding: 5px 14px;
            border-radius: 99px;
            border: 1px solid var(--border2);
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .nav a:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text);
        }

        .nav a.active {
            background: rgba(124, 111, 255, 0.1);
            border-color: var(--purple);
            color: var(--purple2);
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .logo em {
            color: var(--purple);
            font-style: normal;
        }

        .logo-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .game-card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1rem 1.25rem;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .game-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--s3);
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            flex-shrink: 0;
        }

        .game-label-input {
            flex: 1;
            background: var(--s2);
            border: 1px solid var(--border2);
            border-radius: var(--r-sm);
            padding: 6px 10px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            outline: none;
        }

        .game-label-input:focus {
            border-color: var(--purple);
        }

        .game-label-input::placeholder {
            color: var(--hint);
        }

        .sport-select {
            background: var(--s2);
            border: 1px solid var(--border2);
            border-radius: var(--r-sm);
            padding: 6px 10px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            outline: none;
            cursor: pointer;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--hint);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.15s;
        }

        .remove-btn:hover {
            color: var(--red);
        }

        .uploads-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .dz {
            border: 1.5px dashed var(--border2);
            border-radius: var(--r-sm);
            padding: 0.875rem;
            text-align: center;
            cursor: pointer;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.15s;
        }

        .dz:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .dz.ready.b365z {
            border-style: solid;
            border-color: rgba(0, 194, 122, 0.4);
            background: rgba(0, 194, 122, 0.04);
        }

        .dz.ready.bfz {
            border-style: solid;
            border-color: rgba(245, 166, 35, 0.4);
            background: rgba(245, 166, 35, 0.04);
        }

        .dz input {
            display: none;
        }

        .dz-pill {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 99px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .b365-pill {
            background: rgba(0, 194, 122, 0.15);
            color: var(--b365);
            border: 1px solid rgba(0, 194, 122, 0.3);
        }

        .bf-pill {
            background: rgba(245, 166, 35, 0.12);
            color: var(--bf);
            border: 1px solid rgba(245, 166, 35, 0.3);
        }

        .dz-lbl {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .dz-prev {
            width: 100%;
            max-height: 50px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 3px;
            opacity: 0.75;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--border2);
            border-radius: var(--r);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 1.5rem;
        }

        .add-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text);
            background: rgba(255, 255, 255, 0.02);
        }

        .scan-btn {
            width: 100%;
            padding: 14px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: var(--r);
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-bottom: 1.5rem;
        }

        .scan-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .scan-btn:hover:not(:disabled) {
            opacity: 0.88;
        }

        .status {
            border-radius: var(--r-sm);
            padding: 10px 16px;
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status.loading {
            background: rgba(124, 111, 255, 0.1);
            border: 1px solid rgba(124, 111, 255, 0.2);
            color: var(--purple2);
        }

        .status.error {
            background: var(--red-bg);
            border: 1px solid var(--red-bd);
            color: var(--red);
        }

        .status.ok {
            background: var(--green-bg);
            border: 1px solid var(--green-bd);
            color: var(--green);
        }

        .spin {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(124, 111, 255, 0.3);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: sp 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .sm {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1rem 1.25rem;
        }

        .sm-lbl {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--muted);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .sm-val {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .sm-val.g {
            color: var(--green);
        }

        .arb-section {
            margin-bottom: 1.5rem;
        }

        .section-lbl {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.75rem;
        }

        .section-lbl::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .arb-card {
            background: var(--s1);
            border: 2px solid var(--green-bd);
            border-radius: var(--r);
            padding: 1.25rem;
            margin-bottom: 10px;
            animation: fu 0.3s ease both;
            background: linear-gradient(135deg, var(--s1), rgba(45, 202, 138, 0.03));
        }

        @keyframes fu {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .arb-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .arb-av {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--s3);
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--muted);
            flex-shrink: 0;
        }

        .arb-name {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .arb-meta {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .arb-badge {
            margin-left: auto;
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 99px;
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green-bd);
            white-space: nowrap;
        }

        .og {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .ob {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 10px 12px;
        }

        .ob-src {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .ob-src.b {
            color: var(--b365);
        }

        .ob-src.f {
            color: var(--bf);
        }

        .ob-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .ob-lbl {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .ob-v {
            font-family: 'DM Mono', monospace;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text);
        }

        .ob-v.best {
            color: var(--green);
        }

        .ms {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: var(--r-sm);
            margin-bottom: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 0.73rem;
            background: var(--green-bg);
            border: 1px solid var(--green-bd);
            color: var(--green);
        }

        .ms-v {
            font-weight: 500;
            font-size: 0.85rem;
        }

        .sb {
            background: rgba(45, 202, 138, 0.05);
            border: 1px solid var(--green-bd);
            border-radius: var(--r-sm);
            padding: 12px 14px;
        }

        .sb-t {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--green);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .sb-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sb-row label {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--green);
            white-space: nowrap;
        }

        .sb-inp {
            width: 100px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--green-bd);
            border-radius: 6px;
            padding: 7px 10px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            outline: none;
        }

        .sb-inp:focus {
            border-color: var(--green);
        }

        .sr {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .sri {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 6px;
            padding: 8px 10px;
            text-align: center;
        }

        .sri-l {
            font-family: 'DM Mono', monospace;
            font-size: 0.58rem;
            color: rgba(45, 202, 138, 0.6);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .sri-v {
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--green);
        }

        .sport-tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 99px;
            margin-right: 6px;
        }

        .tag-mlb {
            background: rgba(224, 92, 42, 0.15);
            color: #e05c2a;
            border: 1px solid rgba(224, 92, 42, 0.3);
        }

        .tag-nba {
            background: rgba(124, 111, 255, 0.15);
            color: var(--purple2);
            border: 1px solid rgba(124, 111, 255, 0.3);
        }

        .tag-nhl {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .tag-football {
            background: rgba(45, 202, 138, 0.15);
            color: var(--green);
            border: 1px solid var(--green-bd);
        }

        .no-arb {
            text-align: center;
            padding: 2rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--hint);
        }

        @media(max-width:560px) {
            .uploads-row {
                grid-template-columns: 1fr;
            }

            .summary {
                grid-template-columns: 1fr 1fr;
            }

            .og {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <div class="nav">
                <a href="/scanner.html">Bulk Scanner</a>
                <a href="/index.html">Basquete</a>
                <a href="/futebol.html">Futebol</a>
                <a href="/hockey.html">Ice Hockey</a>
                <a href="/mlb.html">MLB</a>
                <a href="/scanner.html" class="active">Bulk Scanner</a>
            </div>
            <div class="logo">arb<em>.</em>scanner</div>
            <div class="logo-sub">Bulk scan · todos os esportes · todos os jogos</div>
        </header>

        <div class="games-list" id="gamesList"></div>

        <button class="add-btn" onclick="addGame()">+ Adicionar jogo</button>

        <button class="scan-btn" id="scanBtn" onclick="scan()">
            Analisar todos os jogos
        </button>

        <div id="statusArea"></div>
        <div id="resultsArea"></div>
    </div>

    <script>
        let games = [];
        let nextId = 0;
        let arbPlayers = [];

        const SPORTS = ['MLB', 'NBA', 'NFL', 'NHL', 'Futebol'];

        function addGame() {
            const id = nextId++;
            games.push({ id, label: '', sport: 'MLB', b365: null, bf: null });
            renderGames();
        }

        function removeGame(id) {
            games = games.filter(g => g.id !== id);
            renderGames();
        }

        function renderGames() {
            document.getElementById('gamesList').innerHTML = games.map((g, i) => `
        <div class="game-card" id="gc-${g.id}">
            <div class="game-header">
                <div class="game-num">${i + 1}</div>
                <input class="game-label-input" placeholder="Ex: ARI Diamondbacks vs COL Rockies"
                    value="${g.label}" oninput="games.find(x=>x.id===${g.id}).label=this.value" />
                <select class="sport-select" onchange="games.find(x=>x.id===${g.id}).sport=this.value">
                    ${SPORTS.map(s => `<option value="${s}" ${g.sport === s ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
                <button class="remove-btn" onclick="removeGame(${g.id})">✕</button>
            </div>
            <div class="uploads-row">
                <div class="dz b365z ${g.b365 ? 'ready' : ''}" id="dz-b365-${g.id}" onclick="document.getElementById('i-b365-${g.id}').click()">
                    <input type="file" id="i-b365-${g.id}" accept="image/*" onchange="loadImg(${g.id},'b365',this)">
                    <span class="dz-pill b365-pill">Bet365</span>
                    <span class="dz-lbl" id="lbl-b365-${g.id}">${g.b365 ? g.b365.name : 'Print Bet365'}</span>
                    ${g.b365 ? `<img class="dz-prev" src="${g.b365.preview}">` : ''}
                </div>
                <div class="dz bfz ${g.bf ? 'ready' : ''}" id="dz-bf-${g.id}" onclick="document.getElementById('i-bf-${g.id}').click()">
                    <input type="file" id="i-bf-${g.id}" accept="image/*" onchange="loadImg(${g.id},'bf',this)">
                    <span class="dz-pill bf-pill">Betfair</span>
                    <span class="dz-lbl" id="lbl-bf-${g.id}">${g.bf ? g.bf.name : 'Print Betfair'}</span>
                    ${g.bf ? `<img class="dz-prev" src="${g.bf.preview}">` : ''}
                </div>
            </div>
        </div>`).join('');
        }

        function loadImg(gameId, casa, input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const game = games.find(g => g.id === gameId);
                if (!game) return;
                game[casa] = {
                    data: e.target.result,
                    mime: file.type || 'image/png',
                    name: file.name.length > 20 ? file.name.slice(0, 18) + '...' : file.name,
                    preview: e.target.result
                };
                renderGames();
            };
            reader.readAsDataURL(file);
        }

        function b64(d) { return d.split(',')[1]; }

        function setStatus(type, msg) {
            const icon = type === 'loading' ? '<div class="spin"></div>' : `<span>${type === 'ok' ? '✓' : '✕'}</span>`;
            document.getElementById('statusArea').innerHTML = `<div class="status ${type}">${icon}<span>${msg}</span></div>`;
        }

        async function scan() {
            const ready = games.filter(g => g.b365 && g.bf);
            if (ready.length === 0) { setStatus('error', 'Adicione pelo menos um jogo com os dois prints.'); return; }

            document.getElementById('scanBtn').disabled = true;
            document.getElementById('resultsArea').innerHTML = '';
            setStatus('loading', `Analisando ${ready.length} jogo${ready.length > 1 ? 's' : ''}... pode levar alguns segundos.`);

            try {
                const res = await fetch('/api/scan-bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        games: ready.map(g => ({
                            label: g.label || `Jogo ${g.id + 1}`,
                            sport: g.sport,
                            b365Image: b64(g.b365.data),
                            b365Mime: g.b365.mime,
                            bfImage: b64(g.bf.data),
                            bfMime: g.bf.mime
                        }))
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error);

                arbPlayers = [];
                let totalPlayers = 0;

                data.results.forEach(r => {
                    r.players.forEach(p => {
                        totalPlayers++;
                        if (p.isArb) arbPlayers.push(p);
                    });
                });

                arbPlayers.sort((a, b) => b.arbPct - a.arbPct);

                setStatus('ok', `${ready.length} jogos analisados · ${totalPlayers} jogadores · ${arbPlayers.length} arbitragem${arbPlayers.length !== 1 ? 's' : ''} encontrada${arbPlayers.length !== 1 ? 's' : ''}`);
                renderResults(totalPlayers);
            } catch (e) {
                setStatus('error', 'Erro: ' + e.message);
            }
            document.getElementById('scanBtn').disabled = false;
        }

        function calcArb(p) {
            if (!p.b365over || !p.b365under || !p.bfover || !p.bfunder) return null;
            const bo = Math.max(p.b365over, p.bfover);
            const bu = Math.max(p.b365under, p.bfunder);
            const m = 1 / bo + 1 / bu;
            return {
                bo, bu, m,
                oc: p.b365over >= p.bfover ? 'Bet365' : 'Betfair',
                uc: p.b365under >= p.bfunder ? 'Bet365' : 'Betfair'
            };
        }

        function renderResults(total) {
            const best = arbPlayers[0];
            document.getElementById('resultsArea').innerHTML = `
        <div class="summary">
            <div class="sm"><div class="sm-lbl">Jogadores</div><div class="sm-val">${total}</div></div>
            <div class="sm"><div class="sm-lbl">Arbitragens</div><div class="sm-val g">${arbPlayers.length}</div></div>
            <div class="sm"><div class="sm-lbl">Melhor margem</div><div class="sm-val g" style="font-size:1.3rem;">${best ? best.arbPct + '%' : '—'}</div></div>
        </div>
        ${arbPlayers.length > 0 ? `
        <div class="arb-section">
            <div class="section-lbl">Arbitragens encontradas — ordenadas por margem</div>
            ${arbPlayers.map((p, i) => renderArbCard(p, i)).join('')}
        </div>` : `<div class="no-arb">Nenhuma arbitragem encontrada nos jogos analisados.</div>`}`;

            arbPlayers.forEach((p, i) => updStake(i, 200));
        }

        function sportTag(sport) {
            const tags = { MLB: 'tag-mlb', NBA: 'tag-nba', NHL: 'tag-nhl', Futebol: 'tag-football' };
            return `<span class="sport-tag ${tags[sport] || 'tag-mlb'}">${sport}</span>`;
        }

        function renderArbCard(p, i) {
            const a = calcArb(p);
            if (!a) return '';
            const ini = p.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
            return `
    <div class="arb-card" style="animation-delay:${i * 0.05}s">
        <div class="arb-top">
            <div class="arb-av">${ini}</div>
            <div>
                <div class="arb-name">${p.name}</div>
                <div class="arb-meta">${sportTag(p.sport)}${p.game} · ${p.linha} O/U</div>
            </div>
            <span class="arb-badge">Arb ${p.arbPct}%</span>
        </div>
        <div class="og">
            <div class="ob"><div class="ob-src b">Bet365</div>
                <div class="ob-row"><span class="ob-lbl">Over ${p.linha}</span><span class="ob-v ${p.b365over >= p.bfover ? 'best' : ''}">${p.b365over?.toFixed(2)}</span></div>
                <div class="ob-row"><span class="ob-lbl">Under ${p.linha}</span><span class="ob-v ${p.b365under >= p.bfunder ? 'best' : ''}">${p.b365under?.toFixed(2)}</span></div>
            </div>
            <div class="ob"><div class="ob-src f">Betfair</div>
                <div class="ob-row"><span class="ob-lbl">Over ${p.linha}</span><span class="ob-v ${p.bfover > p.b365over ? 'best' : ''}">${p.bfover?.toFixed(2)}</span></div>
                <div class="ob-row"><span class="ob-lbl">Under ${p.linha}</span><span class="ob-v ${p.bfunder > p.b365under ? 'best' : ''}">${p.bfunder?.toFixed(2)}</span></div>
            </div>
        </div>
        <div class="ms">
            <span>✓ over ${a.oc} · under ${a.uc}</span>
            <span class="ms-v">${p.margin}%</span>
        </div>
        <div class="sb">
            <div class="sb-t">Quanto apostar</div>
            <div class="sb-row"><label>Total R$</label>
                <input class="sb-inp" type="number" value="200" min="10" step="10" id="si${i}" oninput="updStake(${i},this.value)"/>
            </div>
            <div class="sr" id="sr${i}"></div>
        </div>
    </div>`;
        }

        function updStake(i, total) {
            const p = arbPlayers[i];
            if (!p) return;
            const a = calcArb(p);
            if (!a) return;
            const t = parseFloat(total) || 200;
            const s1 = t * (1 / a.bo) / a.m, s2 = t - s1;
            const r1 = s1 * a.bo - t, r2 = s2 * a.bu - t;
            const el = document.getElementById('sr' + i);
            if (!el) return;
            el.innerHTML = `
        <div class="sri"><div class="sri-l">${a.oc} over</div><div class="sri-v">R$ ${s1.toFixed(2)}</div></div>
        <div class="sri"><div class="sri-l">${a.uc} under</div><div class="sri-v">R$ ${s2.toFixed(2)}</div></div>
        <div class="sri"><div class="sri-l">Lucro mín.</div><div class="sri-v">R$ ${Math.min(r1, r2).toFixed(2)}</div></div>`;
        }

        // começa com 3 jogos
        addGame(); addGame(); addGame();
    </script>
</body>

</html>
