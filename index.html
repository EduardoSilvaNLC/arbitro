<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arb Scanner — NBA Assists</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div style="max-width:820px;margin:0 auto;padding:1.5rem 1.5rem 0;position:relative;z-index:1;">
        <div style="display:flex;gap:8px;margin-bottom:1.5rem;">
            <a href="/index.html"
                style="font-family:'DM Mono',monospace;font-size:0.68rem;padding:5px 14px;border-radius:99px;border:1px solid rgba(124,111,255,0.5);background:rgba(124,111,255,0.1);color:#a89aff;text-decoration:none;letter-spacing:0.05em;text-transform:uppercase;">Basquete</a>
            <a href="/futebol.html"
                style="font-family:'DM Mono',monospace;font-size:0.68rem;padding:5px 14px;border-radius:99px;border:1px solid rgba(255,255,255,0.13);color:#7878a0;text-decoration:none;letter-spacing:0.05em;text-transform:uppercase;">Futebol</a>
            <a href="/mlb.html"
                style="font-family:'DM Mono',monospace;font-size:0.68rem;padding:5px 14px;border-radius:99px;border:1px solid rgba(255,255,255,0.13);color:#7878a0;text-decoration:none;letter-spacing:0.05em;text-transform:uppercase;">Ice
                Hockey</a>
        </div>
    </div>
    <div class="wrap">
        <header>
            <div class="logo">arb<em>.</em>scanner</div>
            <div class="logo-sub">NBA assists</div>
        </header>
        <div class="upload-section">
            <div class="dz b365z" id="dz-b365" onclick="document.getElementById('i-b365').click()">
                <input type="file" id="i-b365" accept="image/*" onchange="loadImg('b365',this)">
                <div style="font-size:1.8rem;opacity:0.2;line-height:1;">↑</div>
                <span class="dz-pill b365-pill">Bet365</span>
                <span class="dz-lbl" id="l-b365">Print de assistências</span>
                <span class="dz-sub">Assists O/U</span>
            </div>
            <div class="dz bfz" id="dz-bf" onclick="document.getElementById('i-bf').click()">
                <input type="file" id="i-bf" accept="image/*" onchange="loadImg('bf',this)">
                <div style="font-size:1.8rem;opacity:0.2;line-height:1;">↑</div>
                <span class="dz-pill bf-pill">Betfair</span>
                <span class="dz-lbl" id="l-bf">Print de assistências</span>
                <span class="dz-sub">Individual Assists</span>
            </div>
        </div>
        <button class="scan-btn" id="scanBtn" onclick="scan()" disabled>Analisar e encontrar arbitragens</button>
        <div id="statusArea"></div>
        <div id="resultsArea"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
