<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arb Scanner — NBA Assists</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090f;
            --s1: #111118;
            --s2: #17171f;
            --s3: #1e1e28;
            --border: rgba(255, 255, 255, 0.07);
            --border2: rgba(255, 255, 255, 0.13);
            --text: #ededf5;
            --muted: #7878a0;
            --hint: #4a4a68;
            --purple: #7c6fff;
            --purple2: #a89aff;
            --green: #2dca8a;
            --green-bg: rgba(45, 202, 138, 0.07);
            --green-bd: rgba(45, 202, 138, 0.22);
            --red: #ff5566;
            --red-bg: rgba(255, 85, 102, 0.07);
            --red-bd: rgba(255, 85, 102, 0.22);
            --b365: #00c27a;
            --bf: #f5a623;
            --r: 12px;
            --r-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(124, 111, 255, 0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(124, 111, 255, 0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem;
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .logo em {
            color: var(--purple);
            font-style: normal;
        }

        .logo-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .dz {
            border: 1.5px dashed var(--border2);
            border-radius: var(--r);
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s;
        }

        .dz:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .dz.ready.b365z {
            border-style: solid;
            border-color: rgba(0, 194, 122, 0.4);
            background: rgba(0, 194, 122, 0.04);
        }

        .dz.ready.bfz {
            border-style: solid;
            border-color: rgba(245, 166, 35, 0.4);
            background: rgba(245, 166, 35, 0.04);
        }

        .dz input {
            display: none;
        }

        .dz-pill {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 99px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .b365-pill {
            background: rgba(0, 194, 122, 0.15);
            color: var(--b365);
            border: 1px solid rgba(0, 194, 122, 0.3);
        }

        .bf-pill {
            background: rgba(245, 166, 35, 0.12);
            color: var(--bf);
            border: 1px solid rgba(245, 166, 35, 0.3);
        }

        .dz-lbl {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
        }

        .dz-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--hint);
        }

        .dz-prev {
            width: 100%;
            max-height: 75px;
            object-fit: cover;
            border-radius: 6px;
            margin-top: 4px;
            opacity: 0.75;
        }

        .scan-btn {
            width: 100%;
            padding: 14px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: var(--r);
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-bottom: 1.5rem;
            letter-spacing: 0.02em;
        }

        .scan-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .scan-btn:hover:not(:disabled) {
            opacity: 0.88;
        }

        .status {
            border-radius: var(--r-sm);
            padding: 10px 16px;
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status.loading {
            background: rgba(124, 111, 255, 0.1);
            border: 1px solid rgba(124, 111, 255, 0.2);
            color: var(--purple2);
        }

        .status.error {
            background: var(--red-bg);
            border: 1px solid var(--red-bd);
            color: var(--red);
        }

        .status.ok {
            background: var(--green-bg);
            border: 1px solid var(--green-bd);
            color: var(--green);
        }

        .spin {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(124, 111, 255, 0.3);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: sp 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .sm {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1rem 1.25rem;
        }

        .sm-lbl {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--muted);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .sm-val {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .sm-val.g {
            color: var(--green);
        }

        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .fb {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            padding: 5px 12px;
            border-radius: 99px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .fb:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text);
        }

        .fb.on {
            background: var(--s2);
            border-color: var(--purple);
            color: var(--purple2);
        }

        .pc {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.25rem;
            margin-bottom: 10px;
            animation: fu 0.3s ease both;
        }

        .pc.arb {
            border-color: var(--green-bd);
            background: linear-gradient(135deg, var(--s1), rgba(45, 202, 138, 0.03));
        }

        @keyframes fu {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pc-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .av {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--s3);
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--muted);
            flex-shrink: 0;
        }

        .pc-name {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .pc-meta {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--muted);
            margin-top: 2px;
            letter-spacing: 0.04em;
        }

        .arb-badge {
            margin-left: auto;
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 99px;
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green-bd);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .og {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .ob {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 10px 12px;
        }

        .ob-src {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .ob-src.b {
            color: var(--b365);
        }

        .ob-src.f {
            color: var(--bf);
        }

        .ob-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .ob-lbl {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .ob-v {
            font-family: 'DM Mono', monospace;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text);
        }

        .ob-v.best {
            color: var(--green);
        }

        .ms {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: var(--r-sm);
            margin-bottom: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 0.73rem;
        }

        .ms.y {
            background: var(--green-bg);
            border: 1px solid var(--green-bd);
            color: var(--green);
        }

        .ms.n {
            background: var(--s2);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .ms-v {
            font-weight: 500;
            font-size: 0.85rem;
        }

        .sb {
            background: rgba(45, 202, 138, 0.05);
            border: 1px solid var(--green-bd);
            border-radius: var(--r-sm);
            padding: 12px 14px;
        }

        .sb-t {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--green);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .sb-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sb-row label {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--green);
            white-space: nowrap;
        }

        .sb-inp {
            width: 100px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--green-bd);
            border-radius: 6px;
            padding: 7px 10px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            outline: none;
        }

        .sb-inp:focus {
            border-color: var(--green);
        }

        .sr {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .sri {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 6px;
            padding: 8px 10px;
            text-align: center;
        }

        .sri-l {
            font-family: 'DM Mono', monospace;
            font-size: 0.58rem;
            color: rgba(45, 202, 138, 0.6);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .sri-v {
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--green);
        }

        .no-data {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            padding: 4px 0;
        }

        .reset-btn {
            width: 100%;
            padding: 11px;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: var(--r);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .reset-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text);
        }

        @media(max-width:560px) {
            .upload-section {
                grid-template-columns: 1fr;
            }

            .summary {
                grid-template-columns: 1fr 1fr;
            }

            .og {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <div class="logo">arb<em>.</em>scanner</div>
            <div class="logo-sub">NBA assists arbitrage · Bet365 × Betfair</div>
        </header>
        <div class="upload-section">
            <div class="dz b365z" id="dz-b365" onclick="document.getElementById('i-b365').click()">
                <input type="file" id="i-b365" accept="image/*" onchange="loadImg('b365',this)">
                <div style="font-size:1.8rem;opacity:0.2;line-height:1;">↑</div>
                <span class="dz-pill b365-pill">Bet365</span>
                <span class="dz-lbl" id="l-b365">Print de assistências</span>
                <span class="dz-sub">Assists O/U</span>
            </div>
            <div class="dz bfz" id="dz-bf" onclick="document.getElementById('i-bf').click()">
                <input type="file" id="i-bf" accept="image/*" onchange="loadImg('bf',this)">
                <div style="font-size:1.8rem;opacity:0.2;line-height:1;">↑</div>
                <span class="dz-pill bf-pill">Betfair</span>
                <span class="dz-lbl" id="l-bf">Print de assistências</span>
                <span class="dz-sub">Individual Assists</span>
            </div>
        </div>
        <button class="scan-btn" id="scanBtn" onclick="scan()" disabled>Analisar e encontrar arbitragens</button>
        <div id="statusArea"></div>
        <div id="resultsArea"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
